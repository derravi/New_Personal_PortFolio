name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Lint & smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Flask Web App/myportfolio"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "Flask Web App/myportfolio/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (flake8, non-blocking style checks)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run test suite
        env:
          SECRET_KEY: ci-test-secret
          ADMIN_TOKEN: ci-test-admin-token
        run: pytest -v

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: "Flask Web App/myportfolio"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (not pushed — wire up a registry login step to publish)
        uses: docker/build-push-action@v5
        with:
          context: "Flask Web App/myportfolio"
          push: false
          tags: ravi-portfolio:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # To actually deploy, add steps here to push to a registry
      # (Docker Hub / GHCR) and then SSH/redeploy on your host, e.g.:
      #
      # - name: Log in to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      #
      # - name: Push image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: "Flask Web App/myportfolio"
      #     push: true
      #     tags: ghcr.io/${{ github.repository }}:latest
