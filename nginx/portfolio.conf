# nginx/portfolio.conf
#
# Reverse proxy config for running the Flask app (via gunicorn, see Dockerfile)
# behind nginx with HTTPS. This is a config file to install on your server —
# it does not run anything on its own.
#
# --- One-time setup on your server (Ubuntu example) ---
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo cp nginx/portfolio.conf /etc/nginx/sites-available/portfolio
#   sudo ln -s /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d your-domain.com -d www.your-domain.com
#
# certbot will rewrite this file to add the SSL certificate paths and a
# redirect block automatically — the HTTP-only server block below is the
# starting point it needs.

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Basic request size limit (contact form / blog posts are tiny)
    client_max_body_size 2M;
}

