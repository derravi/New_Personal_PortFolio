<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .box {
            background: white; border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%; max-width: 400px; padding: 40px;
        }
        .icon {
            width: 60px; height: 60px; margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; font-size: 28px;
        }
        h1 { font-size: 24px; color: #333; text-align: center; margin-bottom: 8px; }
        p.sub { color: #666; font-size: 14px; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        input {
            width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0;
            border-radius: 5px; font-size: 14px; margin-bottom: 18px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 5px; font-size: 16px;
            font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .msg {
            padding: 12px; border-radius: 5px; margin-bottom: 20px;
            font-size: 14px; display: none;
        }
        .msg.error { background: #fee; color: #c00; border-left: 4px solid #c00; }
        .msg.success { background: #efe; color: #0a0; border-left: 4px solid #0a0; }
        .msg.show { display: block; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #667eea; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">🔑</div>
        <h1>Reset Password</h1>
        <p class="sub">Enter your recovery passkey and choose a new password.</p>

        <div class="msg error {% if error %}show{% endif %}" id="errorMsg">{{ error or '' }}</div>
        <div class="msg success" id="successMsg"></div>

        <form id="resetForm">
            <label for="passkey">Recovery Passkey</label>
            <input type="text" id="passkey" name="passkey" inputmode="numeric" placeholder="Enter passkey" required autocomplete="off">

            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" placeholder="At least 6 characters" required autocomplete="new-password">

            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat new password" required autocomplete="new-password">

            <button type="submit" id="submitBtn">Reset Password</button>
        </form>

        <a href="/admin/login" class="back-link">&larr; Back to Login</a>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            const payload = {
                passkey: document.getElementById('passkey').value,
                new_password: document.getElementById('new_password').value,
                confirm_password: document.getElementById('confirm_password').value
            };

            try {
                const res = await fetch('/admin/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (data.success) {
                    successMsg.textContent = data.message + ' Redirecting to login...';
                    successMsg.classList.add('show');
                    setTimeout(() => { window.location.href = data.redirect || '/admin/login'; }, 1200);
                } else {
                    errorMsg.textContent = data.message || 'Something went wrong.';
                    errorMsg.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
