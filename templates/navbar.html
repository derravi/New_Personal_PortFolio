<script>
// Enhanced Navbar Script with Floating Mobile Button
document.addEventListener('DOMContentLoaded', function() {
    const navbar = document.querySelector('.navbar');
    const navLinks = document.querySelectorAll('.nav-link');
    
    // Floating mobile elements
    const floatingBtn = document.getElementById('floatingMobileBtn');
    const sidebar = document.getElementById('mobileSidebar');
    const sidebarOverlay = document.getElementById('mobileSidebarOverlay');
    const sidebarClose = document.getElementById('mobileSidebarClose');
    const sidebarLinks = document.querySelectorAll('.mobile-sidebar-nav a');
    const icon = floatingBtn ? floatingBtn.querySelector('i') : null;
    
    // Navbar scroll effect
    function handleScroll() {
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    }
    
    window.addEventListener('scroll', handleScroll);
    
    // Enhanced hover effects for desktop only
    if (window.innerWidth > 991) {
        navLinks.forEach(link => {
            link.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-2px)';
            });
            
            link.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
            });
        });
    }
    
    // ========== FLOATING MOBILE MENU FUNCTIONS ==========
    
    function openSidebar() {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('active');
        floatingBtn.classList.add('active');
        if (icon) {
            icon.className = 'fas fa-times';
        }
        document.body.style.overflow = 'hidden';
        floatingBtn.setAttribute('aria-label', 'Close navigation menu');
    }
    
    function closeSidebar() {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('active');
        floatingBtn.classList.remove('active');
        if (icon) {
            icon.className = 'fas fa-bars';
        }
        document.body.style.overflow = '';
        floatingBtn.setAttribute('aria-label', 'Toggle navigation menu');
    }
    
    function toggleSidebar() {
        if (sidebar.classList.contains('open')) {
            closeSidebar();
        } else {
            openSidebar();
        }
    }
    
    // Floating button click
    if (floatingBtn) {
        floatingBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            toggleSidebar();
        });
        
        // Touch feedback
        floatingBtn.addEventListener('touchstart', function() {
            this.style.transform = 'scale(0.92)';
        });
        
        floatingBtn.addEventListener('touchend', function() {
            this.style.transform = '';
        });
    }
    
    // Close button in sidebar
    if (sidebarClose) {
        sidebarClose.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            closeSidebar();
        });
    }
    
    // Overlay click to close
    if (sidebarOverlay) {
        sidebarOverlay.addEventListener('click', function(e) {
            if (e.target === this) {
                closeSidebar();
            }
        });
    }
    
    // Sidebar links - close on click
    if (sidebarLinks) {
        sidebarLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                // Allow the click to navigate, then close after a tiny delay
                setTimeout(closeSidebar, 100);
            });
        });
    }
    
    // Escape key to close
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && sidebar.classList.contains('open')) {
            closeSidebar();
        }
    });
    
    // Handle resize - close sidebar when going to desktop
    window.addEventListener('resize', function() {
        if (window.innerWidth >= 992 && sidebar.classList.contains('open')) {
            closeSidebar();
        }
    });
    
    // Initialize navbar state
    handleScroll();
});
</script>
