<script>
// Enhanced Navbar Script with Mobile Optimizations
document.addEventListener('DOMContentLoaded', function() {
    const navbar = document.querySelector('.navbar');
    const navLinks = document.querySelectorAll('.nav-link');
    const navbarToggler = document.querySelector('.navbar-toggler');
    const navbarCollapse = document.querySelector('.navbar-collapse');
    
    // Navbar scroll effect
    function handleScroll() {
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    }
    
    window.addEventListener('scroll', handleScroll);
    
    // Enhanced hover effects for desktop only
    if (window.innerWidth > 991) {
        navLinks.forEach(link => {
            link.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-2px)';
            });
            
            link.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
            });
        });
    }
    
    // Mobile menu close on click
    const navItems = document.querySelectorAll('.nav-item');
    
    navItems.forEach(item => {
        item.addEventListener('click', function() {
            if (window.innerWidth < 992) {
                const bsCollapse = new bootstrap.Collapse(navbarCollapse);
                bsCollapse.hide();
            }
        });
    });
    
    // Touch feedback for mobile
    if (window.innerWidth < 992) {
        navLinks.forEach(link => {
            link.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.98)';
                this.style.background = 'rgba(0, 243, 255, 0.1)';
            });
            
            link.addEventListener('touchend', function() {
                this.style.transform = 'scale(1)';
                if (!this.classList.contains('active')) {
                    this.style.background = 'transparent';
                }
            });
        });
        
        // Touch feedback for navbar toggler
        navbarToggler.addEventListener('touchstart', function() {
            this.style.transform = 'scale(0.95)';
        });
        
        navbarToggler.addEventListener('touchend', function() {
            this.style.transform = 'scale(1)';
        });
    }
    
    // Handle window resize
    window.addEventListener('resize', function() {
        // Close mobile menu when switching to desktop
        if (window.innerWidth >= 992) {
            const bsCollapse = new bootstrap.Collapse(navbarCollapse);
            bsCollapse.hide();
        }
    });
    
    // Prevent body scroll when mobile menu is open
    navbarToggler.addEventListener('click', function() {
        if (window.innerWidth < 992) {
            if (navbarCollapse.classList.contains('show')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        }
    });
    
    // Close mobile menu when clicking outside
    document.addEventListener('click', function(event) {
        if (window.innerWidth < 992 && navbarCollapse.classList.contains('show')) {
            if (!navbar.contains(event.target)) {
                const bsCollapse = new bootstrap.Collapse(navbarCollapse);
                bsCollapse.hide();
                document.body.style.overflow = '';
            }
        }
    });
    
    // Handle escape key to close mobile menu
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && window.innerWidth < 992 && navbarCollapse.classList.contains('show')) {
            const bsCollapse = new bootstrap.Collapse(navbarCollapse);
            bsCollapse.hide();
            document.body.style.overflow = '';
        }
    });
    
    // Initialize navbar state
    handleScroll();
});
</script>
