<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ravi Der - Portfolio{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SEO meta -->
    <meta name="description" content="{% block meta_description %}Ravi Der — AI/ML & Python developer portfolio. Projects, skills, blog and more.{% endblock %}">
    <meta property="og:title" content="{% block og_title %}Ravi Der - Portfolio{% endblock %}">
    <meta property="og:description" content="{% block og_description %}AI/ML & Python developer portfolio — 20+ projects, articles, and more.{% endblock %}">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Favicon & PWA manifest -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#00f3ff">

    <!-- Enhancement systems: theme toggle, filters, lightbox, etc. -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/enhancements.css') }}">
    
    <!-- Mobile & Tablet Responsive Styles (Mobile First Approach) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile-responsive.css') }}">

    {% block extra_css %}{% endblock %}
    
    <style>
    :root {
        --primary: #00f3ff;
        --secondary: #7b00ff;
        --dark: #0a0a1a;
        --darker: #050510;
        --light: #e2f1f8;
        --accent: #ff00c8;
        --sidebar-width: 300px;
        --sidebar-collapsed: 80px;
    }

    /* Remove all scrollbars */
    ::-webkit-scrollbar {
        display: none;
    }

    * {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    html, body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        font-family: 'Exo 2', sans-serif;
        background-color: var(--darker);
        color: var(--light);
        height: 100%;
    }

    /* Sidebar Styles */
    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: var(--sidebar-width);
        background: linear-gradient(180deg, 
            rgba(10, 10, 26, 0.98) 0%, 
            rgba(5, 5, 16, 0.98) 100%);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border-right: 1px solid rgba(0, 243, 255, 0.3);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1000;
        overflow: hidden;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.4);
    }

    .sidebar.collapsed {
        width: var(--sidebar-collapsed);
    }

    .sidebar-header {
        padding: 30px 25px 20px 25px;
        border-bottom: 1px solid rgba(0, 243, 255, 0.2);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        height: 160px;
        background: linear-gradient(135deg, 
            rgba(0, 243, 255, 0.05) 0%, 
            rgba(123, 0, 255, 0.05) 100%);
        gap: 15px;
    }

    .profile-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        transition: all 0.3s ease;
        width: 100%;
    }

    .profile-photo-sidebar {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid var(--primary);
        box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
        transition: all 0.3s ease;
        flex-shrink: 0;
    }

    .sidebar.collapsed .profile-photo-sidebar {
        width: 50px;
        height: 50px;
        border: 2px solid var(--primary);
    }

    .profile-photo-sidebar:hover {
    border-color: var(--accent);
    box-shadow:
        0 0 20px rgba(0, 243, 255, 0.6),
        0 0 40px rgba(0, 243, 255, 0.4),
        0 0 60px rgba(0, 243, 255, 0.2);
    filter: brightness(1.15);
    rotate: 2deg;
    transition: all 0.4s ease-in-out;
    }


    .brand-text {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 1.6rem;
        background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        transition: all 0.3s ease;
        white-space: nowrap;
        text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        text-align: center;
    }

    .sidebar.collapsed .brand-text {
        opacity: 0;
        visibility: hidden;
        position: absolute;
    }

    .sidebar-nav {
        padding: 20px 0;
        height: calc(100vh - 160px);
        overflow-y: auto;
        overflow-x: hidden;
    }

    .sidebar-nav::-webkit-scrollbar {
        display: none;
    }

    .nav-item {
        margin: 8px 20px;
    }

    .nav-link {
        display: flex;
        align-items: center;
        padding: 15px 25px;
        color: var(--light);
        text-decoration: none;
        border-radius: 15px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        white-space: nowrap;
        border: 1px solid transparent;
    }

    .nav-link::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, 
            transparent, 
            rgba(0, 243, 255, 0.15), 
            transparent);
        transition: left 0.6s ease;
    }

    .nav-link:hover::before {
        left: 100%;
    }

    .nav-link:hover {
        color: var(--primary);
        background: rgba(0, 243, 255, 0.08);
        transform: translateX(8px);
        border-color: rgba(0, 243, 255, 0.2);
    }

    .nav-link.active {
        color: var(--primary);
        background: linear-gradient(135deg, 
            rgba(0, 243, 255, 0.2), 
            rgba(123, 0, 255, 0.15));
        box-shadow: 0 5px 20px rgba(0, 243, 255, 0.25);
        border-color: rgba(0, 243, 255, 0.3);
    }

    .nav-icon {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 20px;
        font-size: 1.2rem;
        transition: all 0.3s ease;
        flex-shrink: 0;
    }

    .sidebar.collapsed .nav-text {
        opacity: 0;
        visibility: hidden;
        position: absolute;
    }

    .nav-text {
        font-weight: 600;
        font-size: 1.05rem;
        transition: all 0.3s ease;
    }

    .main-content {
        margin-left: var(--sidebar-width);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        min-height: 100vh;
        position: relative;
        background: var(--darker);
    }

    .main-content.expanded {
        margin-left: var(--sidebar-collapsed);
    }

    /* Top Header with Name */
    .top-header {
        position: fixed;
        top: 0;
        left: var(--sidebar-width);
        right: 0;
        height: 80px;
        background: linear-gradient(90deg, 
            rgba(10, 10, 26, 0.85) 0%, 
            rgba(5, 5, 16, 0.92) 100%);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0, 243, 255, 0.25);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        z-index: 999;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 2px 30px rgba(0, 0, 0, 0.3);
    }

    .main-content.expanded .top-header {
        left: var(--sidebar-collapsed);
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 25px;
    }

    .header-name {
       font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 3rem;
        background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 25px rgba(0, 243, 255, 0.4);
        letter-spacing: 1px;
        transition: all 0.4s ease-in-out;
        cursor: pointer;
    }

    .header-name:hover {
    background: linear-gradient(135deg, var(--accent), var(--secondary), var(--primary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 20px rgba(0, 243, 255, 0.8), 0 0 60px rgba(255, 255, 255, 0.5);
    transform: scale(1);
    letter-spacing: 1px;
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    /* Profile Photo in Main Content */
    .profile-photo-main {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--primary);
        box-shadow: 0 0 25px rgba(0, 243, 255, 0.4);
        transition: all 0.3s ease;
        opacity: 0;
        visibility: hidden;
        cursor: pointer;
    }

    .profile-photo-main:hover {
        transform: scale(1.1);
        box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
    }

    .main-content.expanded .profile-photo-main {
        opacity: 1;
        visibility: visible;
    }

    /* Page Content */
    .page-content {
        padding: 20px;
        margin-top: 100px;
        min-height: calc(100vh - 80px);
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
        .sidebar {
            transform: translateX(-100%);
            width: 280px;
        }

        .sidebar.mobile-open {
            transform: translateX(0);
        }

        .main-content {
            margin-left: 0;
        }

        .top-header {
            left: 0;
            height: 70px;
            padding: 0 25px;
        }

        .mobile-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .mobile-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .header-name {
            font-size: 1.6rem;
        }

        .page-content {
            margin-top: 70px;
            padding: 20px;
        }

        .sidebar-header {
            height: 140px;
            padding: 25px 20px 15px 20px;
        }

        .profile-photo-sidebar {
            width: 60px;
            height: 60px;
        }

        .sidebar.collapsed .profile-photo-sidebar {
            width: 45px;
            height: 45px;
        }

        .brand-text {
            font-size: 1.4rem;
        }
        
        /* Tablet-specific adjustments */
        @media (min-width: 576px) and (max-width: 768px) {
            .sidebar {
                width: 320px;
            }
            
            .header-name {
                font-size: 2rem;
            }
            
            .page-content {
                padding: 30px;
            }
        }
    }

    /* Mobile Menu Button - Updated Position */
    .mobile-menu-btn {
        position: fixed;
        top: 40%; /* Positioned right below the top header */
        left: 8%;
        transform: translateX(-50%);
        z-index: 1100;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border: none;
        color: var(--darker);
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        box-shadow: 0 4px 20px rgba(0, 243, 255, 0.4);
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .mobile-menu-btn:hover {
        transform: translateX(-50%) scale(1.1);
        box-shadow: 0 6px 25px rgba(0, 243, 255, 0.5);
    }

    /* Mobile Menu Button Icon Animation */
    .mobile-menu-btn .fa-bars {
        transition: all 0.3s ease;
        opacity: 1;
        transform: rotate(0deg);
    }
    .mobile-menu-btn .fa-times {
        transition: all 0.3s ease;
        opacity: 0;
        transform: rotate(-90deg);
        position: absolute;
    }

    .mobile-menu-btn.active .fa-bars {
        opacity: 0;
        transform: rotate(90deg);
    }

    .mobile-menu-btn.active .fa-times {
        opacity: 1;
        transform: rotate(0deg);
    }

    @media (max-width: 768px) {
        .mobile-menu-btn {
            display: flex;
        }
    }

    /* Floating Elements Animation */
    .floating-elements {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 1;
        pointer-events: none;
    }

    .floating-element {
        position: absolute;
        background: rgba(0, 243, 255, 0.08);
        border-radius: 50%;
        animation: float 20s infinite linear;
        border: 1px solid rgba(0, 243, 255, 0.1);
    }

    @keyframes float {
        0% {
            transform: translateY(0px) rotate(0deg) scale(1);
        }
        25% {
            transform: translateY(-30px) rotate(90deg) scale(1.1);
        }
        50% {
            transform: translateY(0px) rotate(180deg) scale(1);
        }
        75% {
            transform: translateY(30px) rotate(270deg) scale(0.9);
        }
        100% {
            transform: translateY(0px) rotate(360deg) scale(1);
        }
    }

    /* Background Animation */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
            radial-gradient(circle at 20% 50%, rgba(123, 0, 255, 0.15) 0%, transparent 25%),
            radial-gradient(circle at 80% 20%, rgba(0, 243, 255, 0.1) 0%, transparent 25%),
            radial-gradient(circle at 40% 80%, rgba(255, 0, 200, 0.08) 0%, transparent 25%);
        z-index: -1;
        pointer-events: none;
    }

    /* Footer adjustments: give the footer breathing room from page content
       instead of forcing it flush (was margin-top: 0 !important, which made
       the footer look broken/cramped against the content above it). */
    .footer-futuristic {
        margin-top: 60px;
    }

    /* Ensure no overflow issues */
    html, body {
        width: 100%;
        position: relative;
    }

    /* Smooth transitions for all elements */
    * {
        transition: color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
    }
    
    /* Tablet-specific styles */
    @media (min-width: 769px) and (max-width: 1024px) {
        .mobile-menu-btn {
            display: none; /* Hide on tablets as sidebar is visible */
        }
        .sidebar {
            width: 260px;
        }
        
        .main-content {
            margin-left: 260px;
        }
        
        .top-header {
            left: 260px;
        }
        
        .header-name {
            font-size: 2.2rem;
        }
        
        .page-content {
            padding: 30px;
        }
        
        .nav-link {
            padding: 12px 20px;
        }
        
        .profile-photo-sidebar {
            width: 60px;
            height: 60px;
        }
        
        .sidebar.collapsed .profile-photo-sidebar {
            width: 45px;
            height: 45px;
        }
        
        .sidebar-header {
            padding: 25px 20px 15px 20px;
            height: 140px;
        }
    }
    
    /* Small mobile devices */
    @media (max-width: 576px) {
        .header-name {
            font-size: 1.4rem;
        }
        
        .page-content {
            padding: 15px;
        }
        
        .sidebar {
            width: 260px;
        }
        
        .sidebar-header {
            padding: 20px 15px 10px 15px;
            height: 130px;
        }
        
        .profile-photo-sidebar {
            width: 55px;
            height: 55px;
        }
        
        .nav-link {
            padding: 12px 18px;
        }
        
        .nav-icon {
            width: 24px;
            height: 24px;
            font-size: 1.1rem;
            margin-right: 15px;
        }
        
        .mobile-menu-btn {
            top: 78px; /* Adjusted for smaller header height */
            width: 45px;
            height: 45px;
            font-size: 1.2rem;
        }
    }
    
    /* Landscape orientation for mobile */
    @media (max-height: 500px) and (max-width: 768px) {
        .mobile-menu-btn {
            top: 60px; /* Adjust for shorter header in landscape */
            width: 40px;
            height: 40px;
            font-size: 1.1rem;
        }
        .sidebar-header {
            height: 100px;
            padding: 15px 20px 10px 20px;
        }
        
        .profile-photo-sidebar {
            width: 45px;
            height: 45px;
        }
        
        .brand-text {
            font-size: 1.2rem;
        }
        
        .sidebar-nav {
            height: calc(100vh - 100px);
        }
        
        .nav-link {
            padding: 10px 20px;
        }
    }
    
    /* High-resolution displays */
    @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
        .profile-photo-sidebar,
        .profile-photo-main {
            border-width: 2.5px;
        }
    }
    </style>
</head>
<body>
    <!-- Mobile Menu Button (for mobile only) -->
    <button class="mobile-menu-btn" id="mobileMenuBtn">
        <i class="fas fa-bars"></i>
        <i class="fas fa-times"></i>
    </button>

    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="profile-section">
                <a class="header-name" href="{{ url_for('home') }}">
                <img src="https://res.cloudinary.com/g3cjpmly/image/upload/Profile_image_-_Copy_ko8kx3.jpg" alt="Ravi Der" class="profile-photo-sidebar"> 
                </a> 
            </div>
        </div>
        
        <!-- Floating Elements -->
        <div class="floating-elements">
            <div class="floating-element" style="width: 100px; height: 100px; top: 15%; left: 5%; animation-delay: 0s;"></div>
            <div class="floating-element" style="width: 150px; height: 150px; top: 65%; left: 85%; animation-delay: 5s;"></div>
            <div class="floating-element" style="width: 80px; height: 80px; top: 85%; left: 15%; animation-delay: 10s;"></div>
            <div class="floating-element" style="width: 120px; height: 120px; top: 25%; left: 75%; animation-delay: 15s;"></div>
            <div class="floating-element" style="width: 60px; height: 60px; top: 45%; left: 10%; animation-delay: 2s;"></div>
        </div>
        
        <div class="sidebar-nav">
            <div class="nav-item">
                <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}" href="{{ url_for('home') }}">
                    <div class="nav-icon">
                        <i class="fas fa-home"></i>
                    </div>
                    <span class="nav-text">Home</span>
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link {% if request.endpoint == 'projects' %}active{% endif %}" href="{{ url_for('projects') }}">
                    <div class="nav-icon">
                        <i class="fas fa-code"></i>
                    </div>
                    <span class="nav-text">Projects</span>
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link {% if request.endpoint == 'skills' %}active{% endif %}" href="{{ url_for('skills') }}">
                    <div class="nav-icon">
                        <i class="fas fa-cogs"></i>
                    </div>
                    <span class="nav-text">Skills</span>
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link {% if request.endpoint == 'achievements' %}active{% endif %}" href="{{ url_for('achievements') }}">
                    <div class="nav-icon">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <span class="nav-text">Achievements</span>
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link {% if request.endpoint == 'experience' %}active{% endif %}" href="{{ url_for('experience') }}">
                    <div class="nav-icon">
                        <i class="fas fa-briefcase"></i>
                    </div>
                    <span class="nav-text">Experience</span>
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link {% if request.endpoint == 'my_learning' %}active{% endif %}" href="{{ url_for('my_learning') }}">
                    <div class="nav-icon">
                        <i class="fas fa-code"></i>
                    </div>
                    <span class="nav-text">My Learning</span>
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link {% if request.endpoint == 'education' %}active{% endif %}" href="{{ url_for('education') }}">
                    <div class="nav-icon">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <span class="nav-text">Education</span>
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link {% if request.endpoint == 'blog' %}active{% endif %}" href="{{ url_for('blog') }}">
                    <div class="nav-icon">
                        <i class="fas fa-blog"></i>
                    </div>
                    <span class="nav-text">Blog</span>
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link {% if request.endpoint == 'contact' %}active{% endif %}" href="{{ url_for('contact') }}">
                    <div class="nav-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <span class="nav-text">Contact</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Top Header -->
        <div class="top-header">
            <div class="header-left">
                <a class="header-name" href="{{ url_for('home') }}">
                    <div class="header-name">Ravi Der</div>
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
        
        <!-- Footer -->
        {% include 'footer.html' %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Sidebar Script -->
    <script>


    document.addEventListener('DOMContentLoaded', function() {
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileOverlay = document.getElementById('mobileOverlay');
        
        let isSidebarOpen = false;

        // Mobile menu toggle function
        function toggleMobileMenu() {
            isSidebarOpen = !isSidebarOpen;
            
            if (isSidebarOpen) {
                // Open sidebar
                sidebar.classList.add('mobile-open');
                mobileOverlay.classList.add('active');
                mobileMenuBtn.classList.add('active');
                document.body.style.overflow = 'hidden';
            } else {
                // Close sidebar
                sidebar.classList.remove('mobile-open');
                mobileOverlay.classList.remove('active');
                mobileMenuBtn.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        // Mobile menu toggle
        mobileMenuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            toggleMobileMenu();
        });

        // Close sidebar when clicking overlay
        mobileOverlay.addEventListener('click', function(e) {
            e.stopPropagation();
            toggleMobileMenu();
        });

        // Close sidebar when clicking nav links on mobile
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            link.addEventListener('click', function() {
                if (window.innerWidth <= 768 && isSidebarOpen) {
                    toggleMobileMenu();
                }
            });
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                // Reset mobile menu state on desktop
                sidebar.classList.remove('mobile-open');
                mobileOverlay.classList.remove('active');
                mobileMenuBtn.classList.remove('active');
                document.body.style.overflow = '';
                isSidebarOpen = false;
            }
        });

        // Add hover effects to nav links
        navLinks.forEach(link => {
            link.addEventListener('mouseenter', function() {
                if (window.innerWidth > 768) {
                    this.style.transform = 'translateX(10px)';
                }
            });
            
            link.addEventListener('mouseleave', function() {
                this.style.transform = 'translateX(0)';
            });
        });

        // Add click effect to profile photos
        const profilePhotos = document.querySelectorAll('.profile-photo-sidebar');
        profilePhotos.forEach(photo => {
            photo.addEventListener('click', function(e) {
                e.stopPropagation();
                this.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 150);
            });

            photo.addEventListener('mouseenter', function() {
                if (window.innerWidth > 768) {
                    this.style.transform = 'scale(1.05)';
                }
            });

            photo.addEventListener('mouseleave', function() {
                if (window.innerWidth > 768) {
                    this.style.transform = 'scale(1)';
                }
            });
        });

        // Add more floating elements dynamically
        const floatingContainer = document.querySelector('.floating-elements');
        for (let i = 0; i < 8; i++) {
            const size = Math.random() * 100 + 50;
            const top = Math.random() * 100;
            const left = Math.random() * 100;
            const delay = Math.random() * 20;
            
            const element = document.createElement('div');
            element.className = 'floating-element';
            element.style.width = `${size}px`;
            element.style.height = `${size}px`;
            element.style.top = `${top}%`;
            element.style.left = `${left}%`;
            element.style.animationDelay = `${delay}s`;
            element.style.opacity = Math.random() * 0.15 + 0.05;
            element.style.background = `rgba(${Math.random() * 100}, ${Math.random() * 255}, ${Math.random() * 255}, ${Math.random() * 0.1 + 0.05})`;
            
            floatingContainer.appendChild(element);
        }

        // Keyboard shortcut for sidebar (ESC key)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (window.innerWidth <= 768 && isSidebarOpen) {
                    toggleMobileMenu();
                }
            }
        });

        // Prevent any default drag behaviors
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
        });

        // Ensure smooth animations
        const style = document.createElement('style');
        style.textContent = `
            * {
                -webkit-tap-highlight-color: transparent;
            }
        `;
        document.head.appendChild(style);

        // NOTE: Swipe-to-open/close gesture support has been intentionally removed.
        // The sidebar must only be toggled via the hamburger menu button (#mobileMenuBtn),
        // the overlay click, nav link click, or the ESC key handlers above.
    });
    </script>
    
    <!-- Enhancement systems: theme toggle, filters, lightbox, etc. -->
    <script src="{{ url_for('static', filename='js/enhancements.js') }}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
