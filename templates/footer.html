<script>
// Footer animations
document.addEventListener('DOMContentLoaded', function() {
    // Animate elements on scroll
    const observerOptions = {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = '1';
                entry.target.style.transform = 'translateY(0)';
            }
        });
    }, observerOptions);

    // Observe footer sections
    const footerSections = document.querySelectorAll('.footer-section');
    footerSections.forEach(section => {
        section.style.opacity = '0';
        section.style.transform = 'translateY(20px)';
        section.style.transition = 'all 0.6s ease';
        observer.observe(section);
    });

    // Add hover effects to social links
    const socialLinks = document.querySelectorAll('.social-link');
    socialLinks.forEach(link => {
        link.addEventListener('mouseenter', function() {
            this.style.transform = 'translateX(-5px) scale(1.02)';
        });
        
        link.addEventListener('mouseleave', function() {
            this.style.transform = 'translateX(0) scale(1)';
        });
        
        // Touch feedback for mobile
        link.addEventListener('touchstart', function() {
            this.style.transform = 'scale(0.98)';
            this.style.background = 'rgba(0, 243, 255, 0.1)';
        });
        
        link.addEventListener('touchend', function() {
            this.style.transform = 'scale(1)';
            this.style.background = 'rgba(255, 255, 255, 0.02)';
        });
    });
    
    // Touch feedback for quick links
    const quickLinks = document.querySelectorAll('.quick-link');
    quickLinks.forEach(link => {
        link.addEventListener('touchstart', function() {
            this.style.background = 'rgba(0, 243, 255, 0.1)';
        });
        
        link.addEventListener('touchend', function() {
            this.style.background = 'rgba(0, 243, 255, 0.05)';
        });
    });

    // ===== Newsletter signup (Newsletter System feature) =====
    const newsletterForm = document.getElementById('newsletterForm');
    if (newsletterForm) {
        newsletterForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const emailInput = document.getElementById('newsletterEmail');
            const msg = document.getElementById('newsletterMsg');
            const btn = document.getElementById('newsletterBtn');
            const email = emailInput.value.trim();

            msg.textContent = '';
            msg.className = 'newsletter-msg';
            btn.disabled = true;

            try {
                const res = await fetch('/api/newsletter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    msg.textContent = data.status === 'already_subscribed'
                        ? "You're already subscribed ✓"
                        : 'Subscribed! Check your inbox ✓';
                    msg.classList.add('success');
                    emailInput.value = '';
                } else {
                    msg.textContent = data.error || 'Something went wrong.';
                    msg.classList.add('error');
                }
            } catch (err) {
                msg.textContent = 'Network error — please try again.';
                msg.classList.add('error');
            } finally {
                btn.disabled = false;
            }
        });
    }
});
</script>
