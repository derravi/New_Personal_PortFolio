{% extends 'base.html' %}
{% block title %}Page Not Found - Ravi Der{% endblock %}
{% block content %}
<section class="section">
    <div class="container text-center" style="padding: 80px 20px;">
        <h1 style="font-size: 6rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; color: transparent;">404</h1>
        <h2 style="margin-bottom: 16px;">Page Not Found</h2>
        <p style="opacity: 0.7; margin-bottom: 30px;">The page you're looking for doesn't exist or has moved.</p>
        <a href="{{ url_for('home') }}" class="btn-futuristic"><span>Back to Home</span> <i class="fas fa-home"></i></a>
    </div>
</section>
{% endblock %}
