{% extends 'base.html' %}
{% block title %}Something Went Wrong - Ravi Der{% endblock %}
{% block content %}
<section class="section">
    <div class="container text-center" style="padding: 80px 20px;">
        <h1 style="font-size: 6rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--secondary)); -webkit-background-clip: text; background-clip: text; color: transparent;">500</h1>

        <p style="opacity: 0.7; margin-bottom: 30px;">An unexpected error occurred. It's been logged — please try again in a moment.</p>
        <a href="{{ url_for('home') }}" class="btn-futuristic"><span>Back to Home</span> <i class="fas fa-home"></i></a>
    </div>
</section>
{% endblock %}
