<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel - Portfolio Management{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap is used by the Reviews, Subscribers and Analytics admin pages -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin-responsive.css') }}">

    <!-- ==================== SHARED ADMIN LAYOUT & SIDEBAR STYLES ====================
         Kept in one place so every admin page (dashboard, projects, achievements,
         learning, blog, reviews, subscribers, analytics, settings, forms) renders
         the exact same panel and behaves the same on mobile. -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 0;
            min-height: 100vh;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 0;
            position: fixed;
            width: 250px;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .sidebar-header {
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .sidebar-user {
            font-size: 13px;
            opacity: 0.9;
            word-break: break-word;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            margin: 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s;
            font-size: 14px;
        }

        .sidebar-nav a:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding-left: 25px;
        }

        .sidebar-nav a.active {
            color: white;
            background: rgba(255, 255, 255, 0.2);
            border-left: 3px solid white;
            padding-left: 17px;
        }

        .sidebar-nav i {
            width: 18px;
            text-align: center;
        }

        .sidebar-footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            padding: 0 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ==================== MAIN CONTENT ==================== */
        .main-content {
            grid-column: 2;
            padding: 30px;
            overflow-y: auto;
        }

        /* ==================== SCROLLBAR ==================== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 767px) {
            .dashboard-container {
                grid-template-columns: 1fr;
                min-height: 100vh;
            }

            .sidebar {
                position: fixed;
                width: 280px;
                height: 100vh;
                left: -100%;
                z-index: 2000;
                transition: left 0.3s ease;
                overflow-y: auto;
                padding-top: 20px;
            }

            .sidebar.mobile-open {
                left: 0;
            }

            .mobile-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.6);
                opacity: 0;
                visibility: hidden;
                z-index: 1000;
                transition: all 0.3s ease;
            }

            .mobile-overlay.active {
                opacity: 1;
                visibility: visible;
            }

            .mobile-menu-btn {
                position: fixed;
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border: none;
                color: white;
                font-size: 1.3rem;
                cursor: pointer;
                z-index: 1500;
                box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
                display: flex;
                align-items: center;
                justify-content: center;
                touch-action: manipulation;
            }

            .mobile-menu-btn:active {
                transform: scale(0.95);
            }

            .main-content {
                grid-column: 1;
                padding: 15px;
                margin-left: 0;
                width: 100%;
                padding-bottom: 80px;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="dashboard-container">
        {% include 'admin_sidebar.html' %}

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Bootstrap JS (needed by the Reviews, Subscribers and Analytics admin pages) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ==================== MOBILE MENU TOGGLE ====================
        // Shared across every admin page: creates the hamburger button and
        // overlay on small screens and wires up open/close behavior.
        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.querySelector('.sidebar');
            let isSidebarOpen = false;

            if (!document.querySelector('.mobile-menu-btn')) {
                document.body.insertAdjacentHTML('beforeend', `
                    <button class="mobile-menu-btn" aria-label="Toggle menu">
                        <i class="fas fa-bars"></i>
                    </button>
                `);
                document.body.insertAdjacentHTML('beforeend', '<div class="mobile-overlay"></div>');
            }

            const btn = document.querySelector('.mobile-menu-btn');
            const overlay = document.querySelector('.mobile-overlay');

            function toggleMobileMenu() {
                isSidebarOpen = !isSidebarOpen;

                if (sidebar) {
                    if (isSidebarOpen) {
                        sidebar.classList.add('mobile-open');
                        overlay.classList.add('active');
                        btn.classList.add('active');
                        document.body.style.overflow = 'hidden';
                    } else {
                        sidebar.classList.remove('mobile-open');
                        overlay.classList.remove('active');
                        btn.classList.remove('active');
                        document.body.style.overflow = '';
                    }
                }
            }

            if (btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleMobileMenu();
                });
            }

            if (overlay) {
                overlay.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleMobileMenu();
                });
            }

            if (sidebar) {
                const navLinks = sidebar.querySelectorAll('a');
                navLinks.forEach(link => {
                    link.addEventListener('click', function() {
                        if (window.innerWidth <= 767 && isSidebarOpen) {
                            toggleMobileMenu();
                        }
                    });
                });
            }

            window.addEventListener('resize', function() {
                if (window.innerWidth > 767) {
                    if (sidebar) sidebar.classList.remove('mobile-open');
                    if (overlay) overlay.classList.remove('active');
                    if (btn) btn.classList.remove('active');
                    document.body.style.overflow = '';
                    isSidebarOpen = false;
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && window.innerWidth <= 767 && isSidebarOpen) {
                    toggleMobileMenu();
                }
            });
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
